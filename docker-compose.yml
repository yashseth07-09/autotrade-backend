name: autotrade-core

services:
  bot:
    build: .
    command: python -u bot_engine.py --config /app/config.yaml
    env_file:
      - /etc/autotrade.env
    environment:
      DATA_DIR: /var/lib/autotrade/data
      AUTOTRADE_CONFIG: /app/config.yaml
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      PYTHONUNBUFFERED: "1"
    volumes:
      - /var/lib/autotrade/data:/var/lib/autotrade/data
      - /opt/autotrade/config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  api:
    build: .
    command: uvicorn observer_api:app --host 0.0.0.0 --port 8000
    env_file:
      - /etc/autotrade.env
    environment:
      DATA_DIR: /var/lib/autotrade/data
      AUTOTRADE_CONFIG: /app/config.yaml
      PORT: "8000"
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      PYTHONUNBUFFERED: "1"
    volumes:
      - /var/lib/autotrade/data:/var/lib/autotrade/data
      - /opt/autotrade/config.yaml:/app/config.yaml:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - bot
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      options:
        max-size: "20m"
        max-file: "5"

